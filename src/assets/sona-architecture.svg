<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="720" viewBox="0 0 1344 720">
  <rect width="1344" height="720" fill="#f8f9fa"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="672" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#1a1a2e">SONA AI — Real-Time Voice Emotion Detection Architecture</text>

  <!-- ── ROW 1: Audio pipeline ───────────────────────────────── -->

  <!-- Audio Input -->
  <rect x="40" y="90" width="160" height="100" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="120" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0369a1">Audio Input</text>
  <text x="120" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Microphone / file</text>
  <text x="120" y="168" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">WAV · MP3 · stream</text>

  <!-- Arrow -->
  <line x1="200" y1="140" x2="236" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Librosa Feature Extraction -->
  <rect x="238" y="90" width="180" height="100" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="328" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Librosa Feature</text>
  <text x="328" y="139" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Extraction</text>
  <text x="328" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">MFCCs · chroma · mel</text>
  <text x="328" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">ZCR · spectral centroid</text>

  <!-- Arrow -->
  <line x1="418" y1="140" x2="454" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Preprocessing -->
  <rect x="456" y="90" width="180" height="100" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="546" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Audio</text>
  <text x="546" y="139" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Preprocessing</text>
  <text x="546" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">Normalisation · padding</text>
  <text x="546" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">Fixed-length segments</text>

  <!-- Arrow -->
  <line x1="636" y1="140" x2="672" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TensorFlow Model -->
  <rect x="674" y="90" width="200" height="100" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="774" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#991b1b">TensorFlow CNN</text>
  <text x="774" y="139" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#991b1b">Emotion Classifier</text>
  <text x="774" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Trained on RAVDESS dataset</text>
  <text x="774" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">89% accuracy · 8 emotion classes</text>

  <!-- Arrow -->
  <line x1="874" y1="140" x2="910" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agentic Cross-Validation -->
  <rect x="912" y="90" width="200" height="100" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1012" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Agentic</text>
  <text x="1012" y="139" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Cross-Validation</text>
  <text x="1012" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">Confidence thresholding</text>
  <text x="1012" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">Multi-pass re-evaluation</text>

  <!-- Arrow -->
  <line x1="1112" y1="140" x2="1148" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Emotion Output -->
  <rect x="1150" y="90" width="160" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1230" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">Emotion Output</text>
  <text x="1230" y="142" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Happy · Sad · Angry</text>
  <text x="1230" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Fearful · Disgusted</text>
  <text x="1230" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Surprised · Calm · Neutral</text>

  <!-- ── ROW 2: Model training + API ──────────────────────────── -->

  <!-- Arrow down from TF Model -->
  <line x1="774" y1="190" x2="774" y2="254" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RAVDESS Dataset -->
  <rect x="456" y="256" width="200" height="86" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="556" y="288" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#334155">RAVDESS Dataset</text>
  <text x="556" y="308" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">7,356 labelled audio clips</text>
  <text x="556" y="326" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">24 actors · 8 emotions · studio quality</text>

  <!-- Arrow from RAVDESS → TF Model (upward) -->
  <line x1="656" y1="299" x2="770" y2="230" stroke="#6b7280" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="700" y="256" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9ca3af">training data</text>

  <!-- Model Training details -->
  <rect x="674" y="256" width="200" height="86" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="774" y="282" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Model Training</text>
  <text x="774" y="302" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">CNN · LSTM hybrid architecture</text>
  <text x="774" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">80/20 train-test split · Adam opt.</text>
  <text x="774" y="337" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Categorical cross-entropy loss</text>

  <!-- Arrow down from Agentic -->
  <line x1="1012" y1="190" x2="1012" y2="254" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI Endpoint -->
  <rect x="912" y="256" width="200" height="86" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="1012" y="288" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0369a1">FastAPI Endpoint</text>
  <text x="1012" y="308" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">POST /predict · JSON response</text>
  <text x="1012" y="326" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Sub-200ms end-to-end latency</text>
  <text x="1012" y="344" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Confidence scores per class</text>

  <!-- ── Full pipeline bar ─────────────────────────────────────── -->
  <rect x="40" y="384" width="1272" height="60" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="672" y="408" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#334155">Inference Pipeline</text>
  <text x="672" y="428" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Raw audio → Librosa features → preprocessing → CNN classifier → agentic cross-validation → emotion label + confidence → FastAPI response (&lt;200ms)</text>

  <!-- ── LEGEND ─────────────────────────────────────────────── -->
  <rect x="40" y="480" width="1272" height="200" rx="10" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="672" y="508" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151">8 Emotion Classes</text>

  <!-- Emotion chips -->
  <rect x="80" y="522" width="110" height="28" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="135" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#166534">😊 Happy</text>

  <rect x="204" y="522" width="110" height="28" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="259" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#0369a1">😢 Sad</text>

  <rect x="328" y="522" width="110" height="28" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="383" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#991b1b">😠 Angry</text>

  <rect x="452" y="522" width="110" height="28" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="507" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#92400e">😨 Fearful</text>

  <rect x="576" y="522" width="130" height="28" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="641" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#5b21b6">🤢 Disgusted</text>

  <rect x="720" y="522" width="130" height="28" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="785" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#92400e">😲 Surprised</text>

  <rect x="864" y="522" width="110" height="28" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="919" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#0369a1">😌 Calm</text>

  <rect x="988" y="522" width="110" height="28" rx="14" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="1043" y="541" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#334155">😐 Neutral</text>

  <!-- Stack legend -->
  <line x1="60" y1="572" x2="1292" y2="572" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="80" y="586" width="10" height="10" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <text x="98" y="597" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Librosa (audio feature extraction — MFCCs, chroma, mel spectrogram)</text>

  <rect x="80" y="610" width="10" height="10" rx="2" fill="#fee2e2" stroke="#dc2626"/>
  <text x="98" y="621" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">TensorFlow (CNN+LSTM classifier trained on RAVDESS · 89% accuracy)</text>

  <rect x="520" y="586" width="10" height="10" rx="2" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="538" y="597" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Agentic layer (confidence-based multi-pass cross-validation)</text>

  <rect x="520" y="610" width="10" height="10" rx="2" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="538" y="621" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">FastAPI (REST inference endpoint · sub-200ms latency)</text>

  <rect x="80" y="648" width="10" height="10" rx="2" fill="#f1f5f9" stroke="#64748b"/>
  <text x="98" y="659" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">RAVDESS dataset · 7,356 clips · 24 actors · 8 emotion classes</text>
</svg>
