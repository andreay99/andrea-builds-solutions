<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="720" viewBox="0 0 1344 720">
  <rect width="1344" height="720" fill="#f8f9fa"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="672" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#1a1a2e">Bikeshare Trip Analysis — Data Pipeline Architecture</text>

  <!-- ── ROW 1: Ingestion pipeline ──────────────────────────────── -->

  <!-- Raw CSV Data -->
  <rect x="40" y="90" width="170" height="100" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="125" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0369a1">Raw CSV Data</text>
  <text x="125" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">50,000+ trip records</text>
  <text x="125" y="164" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Date · duration · station</text>
  <text x="125" y="182" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Membership type · bike ID</text>

  <!-- Arrow -->
  <line x1="210" y1="140" x2="248" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Python Ingestion -->
  <rect x="250" y="90" width="175" height="100" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="338" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Python Ingestion</text>
  <text x="338" y="142" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">&amp; Cleaning</text>
  <text x="338" y="163" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">Null handling · type casting</text>
  <text x="338" y="181" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">Date parsing · deduplication</text>

  <!-- Arrow -->
  <line x1="425" y1="140" x2="463" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQLite Database -->
  <rect x="465" y="90" width="200" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="565" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#166534">SQLite Database</text>
  <text x="565" y="142" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Normalised schema</text>
  <text x="565" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">trips · stations · members</text>
  <text x="565" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Indexed on date + station_id</text>

  <!-- Arrow -->
  <line x1="665" y1="140" x2="703" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQL Query Engine -->
  <rect x="705" y="90" width="200" height="100" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="805" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#991b1b">SQL Query Engine</text>
  <text x="805" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Analytical query suite</text>
  <text x="805" y="156" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">CTEs · window functions</text>
  <text x="805" y="174" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">GROUP BY · subqueries</text>

  <!-- Arrow -->
  <line x1="905" y1="140" x2="943" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Matplotlib Dashboards -->
  <rect x="945" y="90" width="200" height="100" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1045" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Matplotlib</text>
  <text x="1045" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Dashboards</text>
  <text x="1045" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">Bar · line · heatmap charts</text>
  <text x="1045" y="176" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">Station maps · trend plots</text>

  <!-- Arrow -->
  <line x1="1145" y1="140" x2="1183" y2="140" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Insights -->
  <rect x="1185" y="90" width="130" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1250" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">12+</text>
  <text x="1250" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">Insights</text>
  <text x="1250" y="166" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Operational</text>
  <text x="1250" y="184" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">findings</text>

  <!-- ── ROW 2: Analysis modules ──────────────────────────────── -->

  <!-- Arrow down from SQL Query Engine -->
  <line x1="805" y1="190" x2="805" y2="254" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Peak Usage Analysis -->
  <rect x="250" y="256" width="190" height="90" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="345" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Peak Usage Analysis</text>
  <text x="345" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Hourly · daily · monthly</text>
  <text x="345" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Rush-hour identification</text>

  <!-- Station Imbalance -->
  <rect x="460" y="256" width="190" height="90" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="555" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Station Imbalance</text>
  <text x="555" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Outflow vs. inflow per hub</text>
  <text x="555" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Rebalancing recommendations</text>

  <!-- Trip Duration -->
  <rect x="670" y="256" width="190" height="90" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="765" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Trip Duration Stats</text>
  <text x="765" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Avg · median · percentiles</text>
  <text x="765" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Member vs. casual riders</text>

  <!-- Seasonal Trends -->
  <rect x="880" y="256" width="190" height="90" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="975" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Seasonal Trends</text>
  <text x="975" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Month-over-month growth</text>
  <text x="975" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Weather-correlated demand</text>

  <!-- Connector lines from SQL to analysis modules -->
  <line x1="705" y1="280" x2="440" y2="280" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="705" y1="290" x2="650" y2="290" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="905" y1="280" x2="870" y2="280" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ── DB Schema box ──────────────────────────────────────────── -->
  <rect x="40" y="256" width="195" height="200" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="138" y="284" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#334155">DB Schema</text>
  <line x1="58" y1="296" x2="217" y2="296" stroke="#e2e8f0" stroke-width="1"/>
  <text x="138" y="316" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#475569">trips</text>
  <text x="138" y="334" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">trip_id · start_dt · end_dt</text>
  <text x="138" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">start_station · end_station</text>
  <text x="138" y="366" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">duration_sec · member_type</text>
  <line x1="58" y1="378" x2="217" y2="378" stroke="#e2e8f0" stroke-width="1"/>
  <text x="138" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#475569">stations</text>
  <text x="138" y="416" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">station_id · name · lat · lon</text>
  <text x="138" y="432" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">capacity · dock_count</text>

  <!-- ── Pipeline bar ─────────────────────────────────────────── -->
  <rect x="40" y="390" width="1272" height="56" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="672" y="413" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#334155">Analysis Pipeline</text>
  <text x="672" y="433" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Raw CSVs → Python cleaning → SQLite schema → analytical SQL queries → Matplotlib visualisations → 12+ operational insights (98% query accuracy)</text>

  <!-- ── LEGEND ─────────────────────────────────────────────── -->
  <rect x="40" y="484" width="1272" height="196" rx="10" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="672" y="510" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151">Key Findings</text>

  <!-- Insights chips -->
  <rect x="70" y="524" width="270" height="28" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="205" y="543" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">📈 Weekday AM/PM peaks account for 62% of rides</text>

  <rect x="360" y="524" width="270" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="495" y="543" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">🚉 Top 5 stations handle 28% of total volume</text>

  <rect x="650" y="524" width="270" height="28" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="785" y="543" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">🌡️ Ridership drops 40% in winter months</text>

  <rect x="930" y="524" width="270" height="28" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="1065" y="543" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">⚖️ 18 stations identified as supply-demand imbalanced</text>

  <!-- Stack legend -->
  <line x1="60" y1="566" x2="1292" y2="566" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="80" y="582" width="10" height="10" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <text x="98" y="593" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Python (pandas, csv ingestion, data cleaning pipeline)</text>

  <rect x="80" y="606" width="10" height="10" rx="2" fill="#dcfce7" stroke="#16a34a"/>
  <text x="98" y="617" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">SQLite (normalised schema, indexed queries, 98% accuracy)</text>

  <rect x="80" y="630" width="10" height="10" rx="2" fill="#fee2e2" stroke="#dc2626"/>
  <text x="98" y="641" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">SQL (CTEs, window functions, GROUP BY, subqueries — analytical suite)</text>

  <rect x="560" y="582" width="10" height="10" rx="2" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="578" y="593" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Matplotlib (bar charts, heatmaps, trend lines, station maps)</text>

  <rect x="560" y="606" width="10" height="10" rx="2" fill="#f1f5f9" stroke="#64748b"/>
  <text x="578" y="617" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">50,000+ real-world trip records · 12+ operational insights uncovered</text>

  <rect x="560" y="630" width="10" height="10" rx="2" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="578" y="641" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Data Analysis · exploratory analysis · operational recommendations</text>
</svg>
