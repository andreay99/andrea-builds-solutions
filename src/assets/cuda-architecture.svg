<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="780" viewBox="0 0 1344 780">
  <rect width="1344" height="780" fill="#f8f9fa"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
  </defs>

  <!-- ── TITLE ──────────────────────────────────────────────────────── -->
  <text x="672" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#1a1a2e">CUDA Flash Attention — Kernel Optimization Architecture</text>

  <!-- ══════════════════════════════════════════════════════════════════
       SECTION 1 — SOFTMAX KERNELS
  ═══════════════════════════════════════════════════════════════════ -->
  <text x="40" y="76" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="0.08em">SOFTMAX OPTIMIZATION</text>
  <line x1="40" y1="82" x2="1304" y2="82" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Naive Softmax -->
  <rect x="40" y="96" width="200" height="110" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="140" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#991b1b">Naive Softmax</text>
  <text x="140" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">1 thread per row</text>
  <text x="140" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">4 blocks for 1024 rows</text>
  <text x="140" y="176" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#b91c1c">36 of 40 SMs idle</text>
  <text x="140" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#dc2626">4.80 GB/s  (seq=512)</text>

  <!-- Arrow naive → optimized -->
  <line x1="240" y1="151" x2="278" y2="151" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Optimized Softmax -->
  <rect x="280" y="96" width="220" height="110" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="390" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#166534">Optimized Softmax</text>
  <text x="390" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">1 block per row (512 threads)</text>
  <text x="390" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Shared memory reduction</text>
  <text x="390" y="176" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Warp-level shuffle ops</text>
  <text x="390" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#15803d">109.85 GB/s  →  22.9× speedup</text>

  <!-- Speedup callout -->
  <rect x="530" y="108" width="130" height="86" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="595" y="132" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e" font-weight="600">Bandwidth</text>
  <text x="595" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#b45309">22.9×</text>
  <text x="595" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#92400e">4.80 → 109.85 GB/s</text>
  <text x="595" y="186" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#92400e">seq=512, NVIDIA T4</text>

  <!-- ══════════════════════════════════════════════════════════════════
       SECTION 2 — ATTENTION: BASELINE vs FLASH
  ═══════════════════════════════════════════════════════════════════ -->
  <text x="40" y="236" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="0.08em">ATTENTION KERNELS — BASELINE vs FLASH</text>
  <line x1="40" y1="242" x2="1304" y2="242" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ─── BASELINE label ─── -->
  <text x="52" y="265" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#dc2626">BASELINE (4-kernel pipeline)</text>

  <!-- Q, K, V inputs -->
  <rect x="40" y="274" width="60" height="34" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="296" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#334155">Q</text>
  <rect x="40" y="316" width="60" height="34" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="338" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#334155">K</text>
  <rect x="40" y="358" width="60" height="34" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="380" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#334155">V</text>

  <line x1="100" y1="291" x2="130" y2="326" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="100" y1="333" x2="130" y2="328" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- QK^T kernel -->
  <rect x="132" y="274" width="148" height="86" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="206" y="302" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#991b1b">QKᵀ GEMM</text>
  <text x="206" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">N×N score matrix S</text>
  <text x="206" y="337" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#dc2626">written to HBM</text>
  <text x="206" y="354" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b91c1c">seq=512: 1.00 MB</text>

  <line x1="280" y1="317" x2="308" y2="317" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Softmax kernel -->
  <rect x="310" y="274" width="148" height="86" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="384" y="302" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#991b1b">Softmax</text>
  <text x="384" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">reads S from HBM</text>
  <text x="384" y="337" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">writes P to HBM</text>
  <text x="384" y="354" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#dc2626">2 full N×N passes</text>

  <line x1="458" y1="317" x2="486" y2="317" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- PV kernel -->
  <rect x="488" y="274" width="148" height="86" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="562" y="302" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#991b1b">PV GEMM</text>
  <text x="562" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">reads P from HBM</text>
  <text x="562" y="337" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">output O written</text>
  <text x="562" y="354" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b91c1c">seq=512: 0.070 ms</text>

  <!-- Total HBM baseline -->
  <rect x="660" y="274" width="170" height="86" rx="10" fill="#fff1f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="745" y="302" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Total HBM Traffic</text>
  <text x="745" y="324" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#dc2626">17.00 MB</text>
  <text x="745" y="346" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#991b1b">seq=1024  ·  0.577 ms</text>
  <text x="745" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#dc2626">N×N score matrix hits DRAM</text>

  <line x1="100" y1="375" x2="487" y2="338" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ─── FLASH ATTENTION label ─── -->
  <text x="52" y="415" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0369a1">FLASH ATTENTION (tiled, online softmax)</text>

  <!-- Q, K, V inputs for flash -->
  <rect x="40" y="424" width="60" height="34" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="70" y="446" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0369a1">Q</text>
  <rect x="40" y="466" width="60" height="34" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="70" y="488" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0369a1">K</text>
  <rect x="40" y="508" width="60" height="34" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="70" y="530" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0369a1">V</text>

  <line x1="100" y1="441" x2="130" y2="471" stroke="#0284c7" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <line x1="100" y1="483" x2="130" y2="475" stroke="#0284c7" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <line x1="100" y1="525" x2="130" y2="488" stroke="#0284c7" stroke-width="1.2" marker-end="url(#arr-blue)"/>

  <!-- Tiled Flash kernel (large block) -->
  <rect x="132" y="424" width="380" height="130" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="322" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0369a1">Flash Attention Tiled Kernel</text>
  <text x="322" y="470" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Tiles of Q, K, V loaded into SRAM (on-chip)</text>
  <text x="322" y="488" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Online softmax — running max m and sum l updated per tile</text>
  <text x="322" y="506" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">S and P matrices never written to DRAM</text>
  <text x="322" y="524" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0284c7">Saves statistics (m, l) for backward pass recomputation</text>
  <text x="322" y="543" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0369a1">Single fused kernel  ·  seq=1024  ·  2.317 ms  ·  T4</text>

  <!-- Flash HBM callout -->
  <rect x="540" y="424" width="170" height="130" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="625" y="452" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#166534">HBM Traffic</text>
  <text x="625" y="478" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#16a34a">0.75 MB</text>
  <text x="625" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#166534">vs 17.00 MB baseline</text>
  <line x1="565" y1="516" x2="705" y2="516" stroke="#bbf7d0" stroke-width="1"/>
  <text x="625" y="532" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#15803d">22.67×</text>
  <text x="625" y="548" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#166534">reduction in DRAM reads</text>

  <!-- ══════════════════════════════════════════════════════════════════
       SECTION 3 — BACKWARD PASS
  ═══════════════════════════════════════════════════════════════════ -->
  <text x="40" y="585" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="0.08em">FLASH ATTENTION BACKWARD PASS — GRADIENT RECOMPUTATION</text>
  <line x1="40" y1="591" x2="1304" y2="591" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Forward: save stats -->
  <rect x="40" y="602" width="220" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="626" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#92400e">Forward Pass</text>
  <text x="150" y="646" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">Compute O — save m (row max)</text>
  <text x="150" y="664" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">and l (normalisation sum)</text>
  <text x="150" y="682" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#d97706">N×N score matrix never stored</text>

  <line x1="260" y1="647" x2="288" y2="647" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backward: recompute P -->
  <rect x="290" y="602" width="260" height="90" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="626" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Backward Pass</text>
  <text x="420" y="646" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">P recomputed from saved m and l</text>
  <text x="420" y="664" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">dS derived without storing S or P</text>
  <text x="420" y="682" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7c3aed">No N×N intermediate — same memory bound</text>

  <line x1="550" y1="647" x2="578" y2="647" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Gradient outputs -->
  <rect x="580" y="602" width="190" height="90" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="675" y="626" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#166534">Gradient Outputs</text>
  <text x="675" y="648" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#166534">dQ · dK · dV</text>
  <text x="675" y="668" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">Max error vs CPU: ~1e-7</text>
  <text x="675" y="684" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#166534">Verified against PyTorch autograd</text>

  <!-- Gradient verification table -->
  <rect x="800" y="602" width="480" height="90" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="1040" y="624" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#334155">Gradient Verification  (seq=256, d=64)</text>
  <line x1="820" y1="632" x2="1260" y2="632" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870"  y="648" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534" font-weight="600">Forward O</text>
  <text x="870"  y="664" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">9.69e-08  ✓ PASS</text>
  <text x="990"  y="648" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534" font-weight="600">dV</text>
  <text x="990"  y="664" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">3.58e-07  ✓ PASS</text>
  <text x="1110" y="648" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534" font-weight="600">dQ</text>
  <text x="1110" y="664" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">4.47e-08  ✓ PASS</text>
  <text x="1230" y="648" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534" font-weight="600">dK</text>
  <text x="1230" y="664" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#16a34a">1.19e-07  ✓ PASS</text>
  <text x="1040" y="684" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">float32 rounding noise — no information loss from recomputation</text>

  <!-- ── STACK LEGEND ─────────────────────────────────────────── -->
  <rect x="40" y="714" width="1264" height="46" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="60" y="726" width="10" height="10" rx="2" fill="#fee2e2" stroke="#dc2626"/>
  <text x="78" y="737" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Naive softmax · CUDA C++</text>
  <rect x="240" y="726" width="10" height="10" rx="2" fill="#dcfce7" stroke="#16a34a"/>
  <text x="258" y="737" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Optimized softmax · shared mem + warp shuffles</text>
  <rect x="520" y="726" width="10" height="10" rx="2" fill="#fee2e2" stroke="#dc2626"/>
  <text x="538" y="737" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Baseline attention · 4-kernel pipeline</text>
  <rect x="740" y="726" width="10" height="10" rx="2" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="758" y="737" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Flash Attention · tiled, online softmax</text>
  <rect x="980" y="726" width="10" height="10" rx="2" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="998" y="737" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">Flash backward · gradient recomputation</text>
  <text x="60" y="752" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Benchmarked on NVIDIA T4  ·  Gradients verified against PyTorch autograd  ·  github.com/andreay99/cuda-flash-attention</text>
</svg>
