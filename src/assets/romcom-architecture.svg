<svg xmlns="http://www.w3.org/2000/svg" width="1344" height="768" viewBox="0 0 1344 768">
  <rect width="1344" height="768" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="672" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#1a1a2e">ROM-COM — Rehabilitation System Architecture</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Row 1: Input pipeline -->

  <!-- Box: Webcam Input -->
  <rect x="40" y="120" width="160" height="90" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="120" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0369a1">Webcam</text>
  <text x="120" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0369a1">Input</text>
  <text x="120" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">30 fps · webcam only</text>

  <!-- Arrow -->
  <line x1="200" y1="165" x2="236" y2="165" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: MediaPipe Pose -->
  <rect x="238" y="120" width="160" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="318" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">MediaPipe</text>
  <text x="318" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Pose</text>
  <text x="318" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">33 joint landmarks</text>

  <!-- Arrow -->
  <line x1="398" y1="165" x2="434" y2="165" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Adaptive ROM Calibration -->
  <rect x="436" y="120" width="160" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="516" y="151" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Adaptive ROM</text>
  <text x="516" y="168" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#92400e">Calibration</text>
  <text x="516" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#92400e">Patient-specific baseline</text>

  <!-- Arrow -->
  <line x1="596" y1="165" x2="632" y2="165" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Feature Extractor -->
  <rect x="634" y="120" width="160" height="90" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="714" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Feature</text>
  <text x="714" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Extractor</text>
  <text x="714" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">Angles · velocity · ROM %</text>

  <!-- Arrow -->
  <line x1="794" y1="165" x2="830" y2="165" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Random Forest Classifier -->
  <rect x="832" y="120" width="160" height="90" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="912" y="151" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Random Forest</text>
  <text x="912" y="168" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#5b21b6">Classifier</text>
  <text x="912" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">scikit-learn · 91% accuracy</text>

  <!-- Arrow -->
  <line x1="992" y1="165" x2="1028" y2="165" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: Gesture Recognition -->
  <rect x="1030" y="120" width="160" height="90" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1110" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">Gesture</text>
  <text x="1110" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">Recognition</text>
  <text x="1110" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Upper-extremity exercises</text>

  <!-- Row 2: Scoring + Backend + Frontend -->

  <!-- Vertical arrow down from Random Forest -->
  <line x1="912" y1="210" x2="912" y2="286" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vertical arrow down from Gesture Recognition -->
  <line x1="1110" y1="210" x2="1110" y2="286" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: FMA-UE Scoring Engine -->
  <rect x="832" y="288" width="160" height="90" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="912" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#991b1b">FMA-UE</text>
  <text x="912" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Scoring Engine</text>
  <text x="912" y="364" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#991b1b">Clinical rehab score 0–66</text>

  <!-- Box: Exercise Logger -->
  <rect x="1030" y="288" width="160" height="90" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1110" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">Exercise</text>
  <text x="1110" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#166534">Logger</text>
  <text x="1110" y="364" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#166534">Reps · ROM · progress</text>

  <!-- Row 3: FastAPI backend -->

  <!-- Vertical arrows down to FastAPI -->
  <line x1="912" y1="378" x2="912" y2="454" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1110" y1="378" x2="1110" y2="454" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: FastAPI WebSocket -->
  <rect x="832" y="456" width="358" height="80" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="1011" y="491" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0369a1">FastAPI WebSocket Server</text>
  <text x="1011" y="515" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0369a1">Real-time bidirectional feedback · Python · sub-100ms latency</text>

  <!-- Arrow down to React frontend -->
  <line x1="1011" y1="536" x2="1011" y2="582" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box: React Frontend -->
  <rect x="832" y="584" width="358" height="80" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="1011" y="619" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#5b21b6">React + TypeScript Frontend</text>
  <text x="1011" y="643" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b21b6">Live joint overlay · score dashboard · session playback</text>

  <!-- Left side: Arduino (optional hardware) -->
  <rect x="40" y="288" width="160" height="90" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="120" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#475569">Arduino</text>
  <text x="120" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#475569">(Optional)</text>
  <text x="120" y="364" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">Haptic feedback</text>

  <!-- Dashed arrow from Arduino to Feature Extractor area -->
  <line x1="200" y1="333" x2="630" y2="200" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="600" width="600" height="100" rx="8" fill="#f8f9fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="625" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151">Stack</text>
  <rect x="60" y="638" width="10" height="10" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <text x="78" y="649" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">MediaPipe · Pose Estimation</text>
  <rect x="240" y="638" width="10" height="10" rx="2" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="258" y="649" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">scikit-learn · React · TypeScript</text>
  <rect x="60" y="662" width="10" height="10" rx="2" fill="#fee2e2" stroke="#dc2626"/>
  <text x="78" y="673" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">FMA-UE Clinical Scoring</text>
  <rect x="240" y="662" width="10" height="10" rx="2" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="258" y="673" font-family="Inter, sans-serif" font-size="11" fill="#6b7280">FastAPI WebSocket · Real-time</text>
</svg>
